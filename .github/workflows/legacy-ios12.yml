name: Build iOS 12 legacy target

on:
  pull_request:
    paths:
      - ".github/workflows/legacy-ios12.yml"
      - "Aidoku.xcodeproj/**"
      - "iOSLegacy/**"
      - "docs/iOS12_PORT.md"
      - "docs/SOURCES_IOS12.md"
  push:
    paths:
      - ".github/workflows/legacy-ios12.yml"
      - "Aidoku.xcodeproj/**"
      - "iOSLegacy/**"
      - "docs/iOS12_PORT.md"
      - "docs/SOURCES_IOS12.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build legacy iOS 12 target
        run: |
          xcodebuild \
            -project iOSLegacy/AidokuLegacy.xcodeproj \
            -scheme "AidokuLegacy (iOS 12)" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
