name: Build iOS 12 legacy IPA

on:
  pull_request:
    paths:
      - ".github/workflows/legacy-ios12.yml"
      - "Aidoku.xcodeproj/**"
      - "iOSLegacy/**"
      - "docs/iOS12_PORT.md"
      - "docs/SOURCES_IOS12.md"
  push:
    paths:
      - ".github/workflows/legacy-ios12.yml"
      - "Aidoku.xcodeproj/**"
      - "iOSLegacy/**"
      - "docs/iOS12_PORT.md"
      - "docs/SOURCES_IOS12.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Get commit SHA
        id: commitinfo
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build fakesigned release IPA
        run: |
          set -euo pipefail
          DERIVED_DATA="$RUNNER_TEMP/AidokuLegacyDerivedData"
          ENTITLEMENTS="$RUNNER_TEMP/AidokuLegacy.entitlements"
          FAKE_TEAM_ID="AIDOKU1234"
          BUNDLE_ID="app.aidoku.AidokuLegacy"
          IPA_NAME="AidokuLegacy-iOS12-${{ steps.commitinfo.outputs.sha_short }}-fakesigned.ipa"

          xcodebuild \
            -project iOSLegacy/AidokuLegacy.xcodeproj \
            -scheme "AidokuLegacy (iOS 12)" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP_PATH="$DERIVED_DATA/Build/Products/Release-iphoneos/AidokuLegacy.app"
          test -d "$APP_PATH"

          cat > "$ENTITLEMENTS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>application-identifier</key>
            <string>${FAKE_TEAM_ID}.${BUNDLE_ID}</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${FAKE_TEAM_ID}</string>
            <key>get-task-allow</key>
            <true/>
            <key>keychain-access-groups</key>
            <array>
              <string>${FAKE_TEAM_ID}.${BUNDLE_ID}</string>
            </array>
          </dict>
          </plist>
          EOF

          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -type f -name "*.dylib" -print0 | while IFS= read -r -d '' dylib; do
              codesign --force --sign - "$dylib"
            done
          fi
          codesign --force --sign - --entitlements "$ENTITLEMENTS" "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          codesign -d --entitlements :- "$APP_PATH"

          rm -rf Payload artifacts
          mkdir -p Payload artifacts
          cp -R "$APP_PATH" Payload/
          zip -qry "artifacts/$IPA_NAME" Payload
          ls -lh "artifacts/$IPA_NAME"

      - name: Upload fakesigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: AidokuLegacy-iOS12-fakesigned-ipa
          path: artifacts/*.ipa
          if-no-files-found: error
