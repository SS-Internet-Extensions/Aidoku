name: Build iOS 12 legacy IPA

on:
  pull_request:
    paths:
      - ".github/workflows/legacy-ios12.yml"
      - "Aidoku.xcodeproj/**"
      - "iOSLegacy/**"
      - "docs/iOS12_PORT.md"
      - "docs/SOURCES_IOS12.md"
  push:
    paths:
      - ".github/workflows/legacy-ios12.yml"
      - "Aidoku.xcodeproj/**"
      - "iOSLegacy/**"
      - "docs/iOS12_PORT.md"
      - "docs/SOURCES_IOS12.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Get commit SHA
        id: commitinfo
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build fakesigned release IPA
        id: buildipa
        run: |
          set -euo pipefail
          DERIVED_DATA="$RUNNER_TEMP/AidokuLegacyDerivedData"
          ENTITLEMENTS="$RUNNER_TEMP/AidokuLegacy.entitlements"
          FAKE_TEAM_ID="AIDOKU1234"
          BUNDLE_ID="app.aidoku.AidokuLegacy"
          IPA_NAME="AidokuLegacy-iOS12-${{ steps.commitinfo.outputs.sha_short }}-fakesigned.ipa"
          LATEST_IPA_NAME="AidokuLegacy-iOS12-latest-fakesigned.ipa"

          xcodebuild \
            -project iOSLegacy/AidokuLegacy.xcodeproj \
            -scheme "AidokuLegacy (iOS 12)" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP_PATH="$DERIVED_DATA/Build/Products/Release-iphoneos/AidokuLegacy.app"
          test -d "$APP_PATH"

          cat > "$ENTITLEMENTS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>application-identifier</key>
            <string>${FAKE_TEAM_ID}.${BUNDLE_ID}</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${FAKE_TEAM_ID}</string>
            <key>get-task-allow</key>
            <true/>
            <key>keychain-access-groups</key>
            <array>
              <string>${FAKE_TEAM_ID}.${BUNDLE_ID}</string>
            </array>
          </dict>
          </plist>
          EOF

          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -type f -name "*.dylib" -print0 | while IFS= read -r -d '' dylib; do
              codesign --force --sign - "$dylib"
            done
          fi
          codesign --force --sign - --entitlements "$ENTITLEMENTS" "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          codesign -d --entitlements :- "$APP_PATH"

          rm -rf Payload artifacts
          mkdir -p Payload artifacts
          cp -R "$APP_PATH" Payload/
          zip -qry "artifacts/$IPA_NAME" Payload
          cp "artifacts/$IPA_NAME" "artifacts/$LATEST_IPA_NAME"
          ls -lh "artifacts/$IPA_NAME"
          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "latest_ipa_name=$LATEST_IPA_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload fakesigned IPA artifact for PR checks
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AidokuLegacy-iOS12-fakesigned-ipa
          path: artifacts/*.ipa
          if-no-files-found: error
          compression-level: 0

      - name: Publish direct IPA release asset
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          IPA_PATH: artifacts/${{ steps.buildipa.outputs.latest_ipa_name }}
        run: |
          set -euo pipefail
          TAG="legacy-ios12-latest"
          TITLE="Aidoku Legacy iOS 12 Latest"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$IPA_PATH" --clobber
          else
            gh release create "$TAG" "$IPA_PATH" \
              --title "$TITLE" \
              --notes "Direct-download fakesigned Aidoku Legacy IPA for iOS 12."
          fi

      - name: Add direct IPA link to summary
        if: github.event_name != 'pull_request'
        run: |
          echo "Direct IPA: https://github.com/${{ github.repository }}/releases/download/legacy-ios12-latest/${{ steps.buildipa.outputs.latest_ipa_name }}" >> "$GITHUB_STEP_SUMMARY"
